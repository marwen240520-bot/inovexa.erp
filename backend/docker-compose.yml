version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: inovexa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inovexa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inovexa-network

  redis:
    image: redis:7
    container_name: inovexa-redis
    ports:
      - "6379:6379"
    networks:
      - inovexa-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: inovexa-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inovexa
      REDIS_URL: redis://redis:6379
      JWT_SECRET: production-secret-key
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - inovexa-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: inovexa-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - inovexa-network

volumes:
  postgres_data:

networks:
  inovexa-network:
    driver: bridge
