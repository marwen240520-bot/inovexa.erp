version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-inovexa
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inovexa_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inovexa-network

  redis:
    image: redis:7-alpine
    container_name: redis-inovexa
    ports:
      - "6379:6379"
    networks:
      - inovexa-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend-inovexa
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: inovexa_erp
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: inovexa_super_secret_key_2025
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - inovexa-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend-inovexa
    ports:
      - "80:3000"
    depends_on:
      - backend
    networks:
      - inovexa-network

volumes:
  postgres_data:

networks:
  inovexa-network:
    driver: bridge
