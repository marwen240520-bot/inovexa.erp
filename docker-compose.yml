version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/inovexa.db
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - backend_data:/app/data
    restart: always
    networks:
      - inovexa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    restart: always
    networks:
      - inovexa-network

networks:
  inovexa-network:
    driver: bridge

volumes:
  backend_data:
