"version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:15\n    container_name: inovexa-postgres\n    environment:\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: postgres\n      POSTGRES_DB: inovexa_erp\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql\n\n  backend:\n    build: ./backend\n    container_name: inovexa-backend\n    ports:\n      - \"3001:3001\"\n    depends_on:\n      - postgres\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_USER: postgres\n      DB_PASSWORD: postgres\n      DB_NAME: inovexa_erp\n\n  frontend:\n    build: ./frontend\n    container_name: inovexa-frontend\n    ports:\n      - \"3000:3000\"\n    depends_on:\n      - backend\n\nvolumes:\n  postgres_data:" 
